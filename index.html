<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ligentia USA — Domestic Transport</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D2233;--teal:#1A6B72;--green:#00A651;--slate:#2D3E50;
  --border:#DDE4EC;--text:#1C2B3A;--sub:#6B7F91;--white:#FFFFFF;
  --red:#B03A2E;--amber:#C97B2E;--bg:#F4F7FA;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{background:var(--white);padding:0.55rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:300;}
.topbar img{height:38px;width:auto;}
.topbar-right{display:flex;align-items:center;gap:0.75rem;}
.topbar-title{font-family:'DM Mono',monospace;font-size:0.66rem;color:var(--sub);letter-spacing:0.08em;text-transform:uppercase;}
.topbar-badge{font-family:'DM Mono',monospace;font-size:0.66rem;color:var(--amber);border:1px solid var(--amber);padding:0.14rem 0.5rem;border-radius:100px;}

/* KPI STRIP */
.kpi-strip{background:var(--white);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.kpi-item{flex:1;padding:0.5rem 0.75rem;border-right:1px solid var(--border);text-align:center;}
.kpi-item:last-child{border-right:none;}
.kpi-val{font-size:1.25rem;font-weight:700;line-height:1;}
.kpi-label{font-size:0.56rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--sub);margin-top:0.15rem;}

/* BODY */
.body-wrap{flex:1;display:flex;min-height:0;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:150px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;position:relative;z-index:10;}
.sb-section{padding:0.7rem 0.6rem 0.5rem;}
.sb-title{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--sub);margin-bottom:0.45rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border);}
.sb-btn{display:block;width:100%;text-align:left;border:1px solid var(--border);background:var(--white);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:0.73rem;padding:0.28rem 0.55rem;border-radius:6px;cursor:pointer;margin-bottom:0.28rem;transition:all 0.12s;}
.sb-btn:hover{background:var(--bg);color:var(--text);border-color:#b0bec5;}
.sb-btn.y-active{background:var(--teal);color:var(--white);border-color:var(--teal);font-weight:600;}
.sb-btn.m-active{background:var(--navy);color:var(--white);border-color:var(--navy);font-weight:600;}
.sb-divider{height:1px;background:var(--border);margin:0.2rem 0.2rem;}
.ctry-btn{display:block;width:100%;text-align:left;border:1px solid var(--border);background:var(--white);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:0.73rem;padding:0.28rem 0.55rem;border-radius:6px;cursor:pointer;margin-bottom:0.28rem;transition:all 0.12s;}
.ctry-btn:hover{background:var(--bg);color:var(--text);border-color:#b0bec5;}
.ctry-btn.c-on{background:var(--teal);color:var(--white);border-color:var(--teal);font-weight:600;}
.sb-chip-group{display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.35rem;}



.sb-chip-label{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--sub);margin-bottom:0.3rem;margin-top:0.1rem;}

/* MAIN COLUMN */
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}

/* MAP */
.map-section{flex:1;position:relative;min-height:0;overflow:visible;}
#map{width:100%;height:100%;z-index:0;}
.map-overlay-bar{position:absolute;top:10px;left:10px;right:10px;z-index:1000;display:flex;align-items:center;gap:0.5rem;pointer-events:none;}
.map-status-pill{background:rgba(13,34,51,0.82);color:rgba(255,255,255,0.9);font-family:'DM Mono',monospace;font-size:0.64rem;padding:0.28rem 0.75rem;border-radius:100px;pointer-events:none;}
.map-controls-pill{display:flex;gap:0.4rem;pointer-events:all;margin-left:auto;}
.map-btn{background:rgba(255,255,255,0.94);border:1px solid var(--border);border-radius:100px;font-family:'DM Sans',sans-serif;font-size:0.71rem;color:var(--text);padding:0.22rem 0.65rem;cursor:pointer;transition:all 0.12s;}
.map-btn:hover{background:var(--white);}
.map-btn.active{background:var(--teal);color:var(--white);border-color:var(--teal);}
.map-legend-pill{position:absolute;bottom:28px;left:10px;z-index:1000;background:rgba(255,255,255,0.96);border:1px solid var(--border);border-radius:8px;padding:0.38rem 0.8rem;font-size:0.62rem;color:var(--sub);display:flex;gap:0.8rem;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);pointer-events:none;}
.leg-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle;}

/* force our overlays above all Leaflet panes */
.map-section .map-overlay-bar,
.map-section .map-legend-pill{z-index:1000 !important;}
.leaflet-top,.leaflet-bottom{z-index:900 !important;}

/* TABLE DRAWER */
.table-drawer{flex-shrink:0;background:var(--white);border-top:2px solid var(--navy);display:flex;flex-direction:column;transition:height 0.25s ease;overflow:hidden;}
.drawer-handle{background:var(--navy);padding:0.38rem 1.2rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;flex-shrink:0;user-select:none;}
.drawer-title{color:var(--white);font-size:0.67rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
.drawer-count{font-family:'DM Mono',monospace;font-size:0.62rem;color:rgba(255,255,255,0.55);margin-left:0.6rem;}
.drawer-toggle{color:rgba(255,255,255,0.7);font-size:0.72rem;transition:transform 0.25s;}
.drawer-toggle.open{transform:rotate(180deg);}
.drawer-controls{background:var(--white);border-bottom:1px solid var(--border);padding:0.38rem 1rem;display:flex;align-items:center;gap:0.45rem;flex-wrap:wrap;flex-shrink:0;}
.ctrl-sel{font-family:'DM Sans',sans-serif;font-size:0.73rem;color:var(--text);border:1px solid var(--border);border-radius:100px;padding:0.25rem 0.65rem;background:var(--white);cursor:pointer;outline:none;}
.ctrl-sel:focus{border-color:var(--teal);}
.srch-inp{border:1px solid var(--border);border-radius:100px;padding:0.25rem 0.85rem;font-size:0.76rem;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);width:185px;outline:none;margin-left:auto;}
.srch-inp:focus{border-color:var(--teal);}
.row-count{font-size:0.67rem;color:var(--sub);font-family:'DM Mono',monospace;white-space:nowrap;}
.table-scroll{overflow-y:auto;flex:1;min-height:0;}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:0.74rem;}
colgroup col:nth-child(1){width:7%;}
colgroup col:nth-child(2){width:9%;}
colgroup col:nth-child(3){width:25%;}
colgroup col:nth-child(4){width:16%;}
colgroup col:nth-child(5){width:16%;}
colgroup col:nth-child(6){width:27%;}
thead tr th{background:var(--navy);color:var(--white);font-weight:600;padding:0.42rem 0.55rem;text-align:left;font-size:0.62rem;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:5;}
tbody tr{border-bottom:1px solid var(--border);background:var(--white);cursor:pointer;}
tbody tr:hover{background:#EEF3FB;}
tbody tr.hidden{display:none;}
tbody tr.row-sel{background:#DFF0FA;}
td{padding:0.4rem 0.55rem;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mono{font-family:'DM Mono',monospace;font-size:0.67rem;color:var(--sub);}
.state-code{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--sub);}
.empty-state{text-align:center;padding:2rem;color:var(--sub);font-size:0.82rem;}

/* Leaflet */
.leaflet-tooltip.state-label{background:transparent;border:none;box-shadow:none;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:#2c3e50;padding:0;pointer-events:none;}
.leaflet-tooltip.lane-tip{background:rgba(13,34,51,0.88);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:0.63rem;padding:4px 8px;border-radius:4px;box-shadow:none;}
</style>
</head>

  OK:[35.6,-96.9],OR:[44.1,-120.5],PA:[40.9,-77.8],RI:[41.7,-71.5],SC:[33.8,-80.9],
  SD:[44.4,-100.2],TN:[35.9,-86.4],TX:[31.1,-97.6],UT:[39.3,-111.1],VT:[44.0,-72.7],
  VA:[37.5,-79.5],WA:[47.4,-120.5],WV:[38.6,-80.6],WI:[44.3,-89.8],WY:[43.0,-107.6],
  DC:[38.9,-77.0],
  BC:[53.7,-127.6],ON:[51.2,-85.3],SK:[54.0,-106.3],AB:[53.9,-116.6],QC:[52.9,-73.5],
  NL:[53.1,-57.6],NS:[45.1,-63.0],NB:[46.5,-66.5],
  MX:[23.6,-102.6]
};

function getCoords(state, city) {
  var MX_STATES = ['CHH','HID','NLE','NL','MOR','MEX','PUE','TAM','COL','GUA','MX'];
  var k = (city || '').toUpperCase().trim();
  // Mexico: look up exact city first, fall back to state centroid
  if (MX_STATES.indexOf(state) !== -1) {
    return MX_CITIES[k] || CENT[state] || CENT['MX'];
  }
  // Australia (Victoria state code VC)
  if (state === 'VC') {
    return MX_CITIES[k] || CENT['VC'];
  }
  // Canada: look up city first, fall back to province centroid
  if (CA_PROVINCES.indexOf(state) !== -1) {
    return CA_CITIES[k] || CENT[state] || null;
  }
  return CENT[state] || null;
}

const STATE_NAME_TO_ABBR = {
  'Alabama':'AL','Alaska':'AK','Arizona':'AZ','Arkansas':'AR','California':'CA',
  'Colorado':'CO','Connecticut':'CT','Delaware':'DE','Florida':'FL','Georgia':'GA',
  'Hawaii':'HI','Idaho':'ID','Illinois':'IL','Indiana':'IN','Iowa':'IA','Kansas':'KS',
  'Kentucky':'KY','Louisiana':'LA','Maine':'ME','Maryland':'MD','Massachusetts':'MA',
  'Michigan':'MI','Minnesota':'MN','Mississippi':'MS','Missouri':'MO','Montana':'MT',
  'Nebraska':'NE','Nevada':'NV','New Hampshire':'NH','New Jersey':'NJ','New Mexico':'NM',
  'New York':'NY','North Carolina':'NC','North Dakota':'ND','Ohio':'OH','Oklahoma':'OK',
  'Oregon':'OR','Pennsylvania':'PA','Rhode Island':'RI','South Carolina':'SC',
  'South Dakota':'SD','Tennessee':'TN','Texas':'TX','Utah':'UT','Vermont':'VT',
  'Virginia':'VA','Washington':'WA','West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY',
  'District of Columbia':'DC'
};

let activeYear='all', activeMonth='all', custF='', carrF='', stateF='', srchQ='';
let origCtryFilter='all', destCtryFilter='all';

// US state codes (2-letter, excluding Canadian/Mexican 2-letter codes)
const US_SET=new Set(['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA',
  'KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND',
  'OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC']);
// Canadian province codes that appear in the data
const CA_SET=new Set(['BC','ON','NS','QC','SK']);
// Mexican state codes (all 3-letter codes + MX + NL which is Nuevo León)
const MX_SET=new Set(['CHH','COL','GUA','HID','MEX','MOR','NL','NLE','PUE','TAM','MX']);

function stateCountry(s){
  if(US_SET.has(s)) return 'US';
  if(CA_SET.has(s)) return 'CA';
  if(MX_SET.has(s)) return 'MX';
  return 'OTHER';
}

let map, arcLayers=[], dotLayers=[], statesGeoLayer=null, selectedRow=null, drawerOpen=true;

// Populate origin state dropdown
const stateSet=[...new Set(ALL.map(r=>r.origState).filter(Boolean))].sort();
const ss=document.getElementById('stateSel');
stateSet.forEach(s=>{ const o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o); });

// Build table rows
const tbody=document.getElementById('tbody');
ALL.forEach((r,i)=>{
  const tr=document.createElement('tr');
  tr.dataset.i=i; tr.dataset.year=String(r.year); tr.dataset.month=String(r.month);
  tr.dataset.cust=r.customer.toLowerCase(); tr.dataset.carr=r.carrier.toLowerCase();
  tr.dataset.ostate=r.origState; tr.dataset.dstate=r.destState;
  tr.dataset.srch=(r.airbill+' '+r.customer+' '+r.origCity+' '+r.origState+' '+r.destCity+' '+r.destState+' '+r.carrier).toLowerCase();
  tr.innerHTML=`
    <td class="mono">${r.airbill}</td>
    <td class="mono">${r.date}</td>
    <td style="font-weight:600;overflow:hidden;text-overflow:ellipsis">${r.customer}</td>
    <td>${r.origCity}<br/><span class="state-code">${r.origState}</span></td>
    <td>${r.destCity}<br/><span class="state-code">${r.destState}</span></td>
    <td style="color:var(--slate);font-size:.7rem;overflow:hidden;text-overflow:ellipsis">${r.carrier}</td>
  `;

// Drawer toggle
function toggleDrawer(){
  const el=document.getElementById('tableDrawer');
  const tg=document.getElementById('drawerToggle');
  drawerOpen=!drawerOpen;
  el.style.height=drawerOpen?'300px':'40px';
  tg.classList.toggle('open',drawerOpen);
  if(map) setTimeout(()=>map.invalidateSize(),260);

// Map init
window.addEventListener('load',()=>{
  map=L.map('map',{center:[38,-96],zoom:4,scrollWheelZoom:true,preferCanvas:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
    .then(r=>r.json())
    .then(geo=>{
      statesGeoLayer=L.geoJson(geo,{
        style:()=>({fillColor:'#E8F0F8',weight:1,color:'#ffffff',fillOpacity:0.5}),
        onEachFeature:(feature,layer)=>{
          const code=STATE_NAME_TO_ABBR[feature.properties.name];
          if(!code) return;
          L.tooltip({permanent:true,direction:'center',className:'state-label'})
            .setContent(code).setLatLng(layer.getBounds().getCenter()).addTo(map);
          layer.on({
            mouseover:e=>e.target.setStyle({weight:2,fillOpacity:0.7,color:'#1A6B72'}),
            mouseout:e=>statesGeoLayer.resetStyle(e.target),
          });
        }
      }).addTo(map);
      document.getElementById('mapStatus').textContent='All lanes';
      applyFilters();
    })
    .catch(()=>{ document.getElementById('mapStatus').textContent='Map loaded'; applyFilters(); });
});

// Curved arc
function curvedArc(from,to,n=40){
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    const lat=from[0]*(1-t)+to[0]*t;
    const lng=from[1]*(1-t)+to[1]*t;
    const lift=Math.sin(Math.PI*t)*Math.abs(to[1]-from[1])*0.15;
    pts.push([lat+lift*0.35,lng]);
  }
  return pts;
}

// Draw all lanes
function drawLanes(data){
  arcLayers.forEach(l=>map.removeLayer(l)); arcLayers=[];
  dotLayers.forEach(l=>map.removeLayer(l)); dotLayers=[];
  const MX_CODES=['CHH','HID','NLE','NL','MOR','MEX','PUE','TAM','COL','GUA','MX','BC','NS','ON','QC','SK','AB','NB','MB','PE','VC'];
  const laneMap={};
  data.forEach(r=>{
    const oKey=MX_CODES.indexOf(r.origState)!==-1?r.origCity:r.origState;
    const dKey=MX_CODES.indexOf(r.destState)!==-1?r.destCity:r.destState;
    const k=oKey+'\u2192'+dKey;
    if(!laneMap[k]) laneMap[k]={cnt:0,oC:getCoords(r.origState,r.origCity),dC:getCoords(r.destState,r.destCity),o:r.origState,d:r.destState,oCity:r.origCity,dCity:r.destCity};
    laneMap[k].cnt++;
  });
  const maxC=Math.max(...Object.values(laneMap).map(v=>v.cnt),1);
  const drawnDots=new Set();
  Object.values(laneMap).forEach(lane=>{
    if(!lane.oC||!lane.dC) return;
    const alpha=0.12+0.55*(lane.cnt/maxC);
    const weight=lane.cnt>100?3:lane.cnt>30?2:1.2;
    const arc=L.polyline(curvedArc(lane.oC,lane.dC),{color:'#1A6B72',weight,opacity:alpha,smoothFactor:1});
    arc.bindTooltip(`${lane.oCity||lane.o}, ${lane.o} → ${lane.dCity||lane.d}, ${lane.d}: ${lane.cnt} job${lane.cnt>1?'s':''}`,{className:'lane-tip',sticky:true});
    arc.addTo(map); arcLayers.push(arc);
    const ok=lane.o+(lane.oCity||'');
    if(!drawnDots.has(ok)){
      dotLayers.push(L.circleMarker(lane.oC,{radius:4,fillColor:'#1A6B72',color:'#fff',weight:1.5,fillOpacity:0.9}).addTo(map));
      drawnDots.add(ok);
    }
    const dk=lane.d+(lane.dCity||'');
    if(!drawnDots.has(dk)){
      dotLayers.push(L.circleMarker(lane.dC,{radius:4,fillColor:'#C97B2E',color:'#fff',weight:1.5,fillOpacity:0.9}).addTo(map));
      drawnDots.add(dk);
    }
  });
  const lc=Object.keys(laneMap).length;
  document.getElementById('mapStatus').textContent=lc+' lanes · '+data.length.toLocaleString()+' jobs';
  document.getElementById('k-lanes').textContent=lc.toLocaleString();
  document.getElementById('btnResetLane').style.display='none';
  document.getElementById('btnAllLanes').classList.add('active');
}

// Highlight single row lane
function highlightRow(tr,r){
  if(selectedRow) selectedRow.classList.remove('row-sel');
  selectedRow=tr; tr.classList.add('row-sel');
  arcLayers.forEach(l=>map.removeLayer(l)); arcLayers=[];
  dotLayers.forEach(l=>map.removeLayer(l)); dotLayers=[];
  const oC=getCoords(r.origState,r.origCity), dC=getCoords(r.destState,r.destCity);
  if(oC&&dC){
    const arc=L.polyline(curvedArc(oC,dC),{color:'#C97B2E',weight:3,opacity:0.95});
    arc.bindTooltip(`${r.origCity}, ${r.origState} → ${r.destCity}, ${r.destState}`,{className:'lane-tip',sticky:true});
    arc.addTo(map); arcLayers.push(arc);
    dotLayers.push(
      L.circleMarker(oC,{radius:8,fillColor:'#1A6B72',color:'#fff',weight:2,fillOpacity:1})
        .bindTooltip(`${r.origCity}, ${r.origState}`,{className:'lane-tip'}).addTo(map),
      L.circleMarker(dC,{radius:8,fillColor:'#C97B2E',color:'#fff',weight:2,fillOpacity:1})
        .bindTooltip(`${r.destCity}, ${r.destState}`,{className:'lane-tip'}).addTo(map)
    );
    map.fitBounds(L.latLngBounds([oC,dC]).pad(0.35));
  }
  document.getElementById('mapStatus').textContent=r.origCity+', '+r.origState+' → '+r.destCity+', '+r.destState;
  document.getElementById('btnResetLane').style.display='';
  document.getElementById('btnAllLanes').classList.remove('active');
}

function showAllLanes(){ applyFilters(); }
function resetHighlight(){ if(selectedRow){selectedRow.classList.remove('row-sel');selectedRow=null;} applyFilters(); }

// Apply all filters
function applyFilters(){
  const rows=tbody.querySelectorAll('tr');
  const vis=[]; const yc={2024:0,2025:0,2026:0};
  const vC=new Set(), vK=new Set();
  rows.forEach(tr=>{
    let show=true;
    if(activeYear!=='all' && tr.dataset.year!==activeYear) show=false;
    if(activeMonth!=='all' && tr.dataset.month!==activeMonth) show=false;
    if(custF && tr.dataset.cust!==custF.toLowerCase()) show=false;
    if(carrF && tr.dataset.carr!==carrF.toLowerCase()) show=false;
    if(stateF && tr.dataset.ostate!==stateF) show=false;
    if(srchQ && !tr.dataset.srch.includes(srchQ)) show=false;
    if(origCtryFilter!=='all' && stateCountry(tr.dataset.ostate)!==origCtryFilter) show=false;
    if(destCtryFilter!=='all' && stateCountry(tr.dataset.dstate)!==destCtryFilter) show=false;    tr.classList.toggle('hidden',!show);
    if(show){
      vis.push(ALL[+tr.dataset.i]);
      yc[+tr.dataset.year]++;
      vC.add(tr.dataset.cust);
      vK.add(tr.dataset.carr);
    }
  });
  const n=vis.length;
  document.getElementById('k-total').textContent=n.toLocaleString();
  document.getElementById('k-2024').textContent=yc[2024].toLocaleString();
  document.getElementById('k-2025').textContent=yc[2025].toLocaleString();
  document.getElementById('k-2026').textContent=yc[2026].toLocaleString();
  document.getElementById('k-custs').textContent=vC.size;
  document.getElementById('k-carrs').textContent=vK.size;
  document.getElementById('rowCount').textContent=n.toLocaleString()+' jobs';
  document.getElementById('drawerCount').textContent=n.toLocaleString()+' jobs';
  document.getElementById('topBadge').textContent=n.toLocaleString()+' jobs';
  document.getElementById('emptyState').classList.toggle('hidden',n>0);
  if(map) drawLanes(vis);
}

// Wire sidebar
document.querySelectorAll('[data-year]').forEach(b=>b.addEventListener('click',()=>{
  activeYear=b.dataset.year;
  document.querySelectorAll('[data-year]').forEach(x=>x.classList.remove('y-active'));
  b.classList.add('y-active'); applyFilters();
}));
document.querySelectorAll('[data-month]').forEach(b=>b.addEventListener('click',()=>{
  const wasActive=b.classList.contains('m-active');
  document.querySelectorAll('[data-month]').forEach(x=>x.classList.remove('m-active'));
  if(!wasActive){ b.classList.add('m-active'); activeMonth=b.dataset.month; }
  else{ document.querySelector('[data-month="all"]').classList.add('m-active'); activeMonth='all'; }
  applyFilters();
}));
document.getElementById('custSel').addEventListener('change',e=>{custF=e.target.value;applyFilters();});
document.getElementById('carrSel').addEventListener('change',e=>{carrF=e.target.value;applyFilters();});
document.getElementById('stateSel').addEventListener('change',e=>{stateF=e.target.value;applyFilters();});
document.getElementById('srch').addEventListener('input',e=>{srchQ=e.target.value.toLowerCase().trim();applyFilters();});

// Country filter buttons
function setOrigCtry(val){
  origCtryFilter=val;
  ['co-all','co-us','co-ca','co-mx'].forEach(id=>document.getElementById(id).classList.remove('c-on'));
  document.getElementById('co-'+(val==='all'?'all':val.toLowerCase())).classList.add('c-on');
  applyFilters();
}
function setDestCtry(val){
  destCtryFilter=val;
  ['cd-all','cd-us','cd-ca','cd-mx'].forEach(id=>document.getElementById(id).classList.remove('c-on'));
  document.getElementById('cd-'+(val==='all'?'all':val.toLowerCase())).classList.add('c-on');
  applyFilters();
}
document.getElementById('co-all').addEventListener('click',()=>setOrigCtry('all'));
document.getElementById('co-us').addEventListener('click',()=>setOrigCtry('US'));
document.getElementById('co-ca').addEventListener('click',()=>setOrigCtry('CA'));
document.getElementById('co-mx').addEventListener('click',()=>setOrigCtry('MX'));
document.getElementById('cd-all').addEventListener('click',()=>setDestCtry('all'));
document.getElementById('cd-us').addEventListener('click',()=>setDestCtry('US'));
document.getElementById('cd-ca').addEventListener('click',()=>setDestCtry('CA'));
document.getElementById('cd-mx').addEventListener('click',()=>setDestCtry('MX'));

</script>
